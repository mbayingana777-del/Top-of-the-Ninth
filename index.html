<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top of the Ninth | Order Pizza, Wings & Hoagies Online</title>
    <meta name="description" content="Order pizza, wings, hoagies & salads from Top of the Ninth. Fast delivery in New Brighton, PA. 4.1★ on Yelp.">
    <style>
        :root {
            --primary: #dc2626;
            --primary-dark: #991b1b;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #d1d5db;
            --text-muted: #9ca3af;
            --border: #2a2a2a;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }

        a { color: inherit; text-decoration: none; }
        button { font: inherit; cursor: pointer; border: none; background: none; }
        img { max-width: 100%; display: block; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* ANNOUNCEMENT */
        .announcement {
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 12px 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
        }

        /* STICKY NAV */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .nav-cart {
            background: var(--primary);
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-cart:hover {
            background: var(--primary-dark);
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            padding: 60px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--text-primary);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
        }

        /* MENU SECTION */
        .menu-section {
            padding: 60px 20px;
            background: var(--bg-dark);
        }

        .section-title {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 40px;
            text-align: center;
        }

        .menu-tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: var(--bg-card);
            color: var(--text-muted);
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .tab-btn.active {
            background: var(--primary);
            color: var(--text-primary);
            border-color: var(--primary);
        }

        .tab-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* MENU ITEM CARD */
        .menu-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .menu-item:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }

        .item-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .item-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .item-desc {
            font-size: 13px;
            color: var(--text-muted);
        }

        .item-body {
            padding: 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .menu-item.expanded .item-body {
            max-height: 500px;
        }

        /* PIZZA CUSTOMIZATION */
        .size-selector {
            margin-bottom: 20px;
        }

        .size-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: block;
        }

        .size-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .size-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .size-btn.selected {
            background: var(--primary);
            border-color: var(--primary);
        }

        .size-btn:hover {
            border-color: var(--primary);
        }

        /* TOPPINGS SELECTOR */
        .toppings-section {
            margin-bottom: 20px;
        }

        .toppings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .topping-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topping-item input {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .topping-item label {
            font-size: 13px;
            cursor: pointer;
            flex: 1;
        }

        /* SAUCE SELECTOR */
        .sauce-selector {
            margin-bottom: 20px;
        }

        .sauce-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .sauce-btn {
            padding: 10px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .sauce-btn.selected {
            background: var(--primary);
            border-color: var(--primary);
        }

        .sauce-btn:hover {
            border-color: var(--primary);
        }

        /* QUANTITY & ADD */
        .item-footer {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-dark);
            border-radius: 6px;
            padding: 6px 8px;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }

        .qty-btn:hover {
            color: var(--primary);
        }

        .qty-display {
            width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .add-btn {
            flex: 1;
            padding: 10px;
            background: var(--primary);
            color: var(--text-primary);
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-btn:hover {
            background: var(--primary-dark);
        }

        /* CART MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 60px;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 900;
        }

        .close-btn {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .cart-item {
            background: var(--bg-dark);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .cart-item-name {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .cart-item-details {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .cart-item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item-price {
            font-weight: 700;
            color: var(--primary);
        }

        .remove-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .modal-footer {
            padding: 24px;
            border-top: 1px solid var(--border);
            background: var(--bg-dark);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 16px;
        }

        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--text-primary);
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkout-btn:hover {
            background: var(--primary-dark);
        }

        .checkout-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero h1 { font-size: 32px; }
            .menu-grid { grid-template-columns: 1fr; }
            .hero-buttons { flex-direction: column; }
            .hero-buttons .btn { width: 100%; }
            .toppings-grid { grid-template-columns: 1fr; }
            .size-options { flex-direction: column; }
            .size-btn { width: 100%; }
        }

        @media (max-width: 480px) {
            .hero { padding: 40px 16px; }
            .hero h1 { font-size: 24px; }
            .menu-section { padding: 40px 16px; }
            .modal { padding: 12px; }
            .modal-content { max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- ANNOUNCEMENT -->
    <div class="announcement">
        🔥 Open Tue-Sat 4PM-10PM | Call (724) 846-9999
    </div>

    <!-- STICKY NAV -->
    <nav>
        <div class="nav-container">
            <div class="nav-logo">TOP OF THE NINTH</div>
            <button class="nav-cart" onclick="openCart()">
                🛒 Cart (<span id="cartCount">0</span>)
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <h1>Order Now</h1>
        <p>Fresh pizza, crispy wings & hoagies on Mancini's bread</p>
        <div class="hero-buttons">
            <button class="btn btn-primary" onclick="document.querySelector('.menu-tabs').scrollIntoView({behavior:'smooth'})">Browse Menu</button>
            <a href="tel:+17248469999" class="btn btn-secondary">Call (724) 846-9999</a>
        </div>
    </section>

    <!-- MENU -->
    <section class="menu-section">
        <div class="container">
            <h2 class="section-title">Full Menu</h2>
            <div class="menu-tabs">
                <button class="tab-btn active" onclick="switchCategory('pizza', this)">🍕 Pizza</button>
                <button class="tab-btn" onclick="switchCategory('wings', this)">🍗 Wings</button>
                <button class="tab-btn" onclick="switchCategory('hoagies', this)">🥪 Hoagies</button>
                <button class="tab-btn" onclick="switchCategory('salads', this)">🥗 Salads</button>
                <button class="tab-btn" onclick="switchCategory('desserts', this)">🍰 Desserts</button>
            </div>
            <div class="menu-grid" id="menuGrid"></div>
        </div>
    </section>

    <!-- CART MODAL -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Your Cart</h2>
                <button class="close-btn" onclick="closeCart()">✕</button>
            </div>
            <div class="modal-body" id="cartBody">
                <div class="cart-empty">Your cart is empty</div>
            </div>
            <div class="modal-footer" id="cartFooter" style="display:none;">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotal">$0.00</span>
                </div>
                <a href="tel:+17248469999" class="checkout-btn">Call to Order</a>
            </div>
        </div>
    </div>

    <script>
        const menuData = {
            pizza: [
                { name: 'Cheese Pizza', desc: 'Fresh dough, homemade sauce, melted cheese', sizes: ['Small', 'Medium', 'Large'], toppings: ['Pepperoni', 'Sausage', 'Bacon', 'Ham', 'Mushroom', 'Onion', 'Green Pepper', 'Banana Pepper', 'Sweet Pepper', 'Extra Cheese'] },
                { name: 'Deluxe Pizza', desc: 'Loaded with premium toppings', sizes: ['Small', 'Medium', 'Large'], toppings: ['Pepperoni', 'Sausage', 'Bacon', 'Ham', 'Mushroom', 'Onion', 'Green Pepper', 'Banana Pepper', 'Sweet Pepper', 'Extra Cheese'] }
            ],
            wings: [
                { name: '10 Wings', desc: 'Choose your sauce', quantity: '10 pieces', sauces: ['Hot', 'Medium', 'Mild', 'BBQ', 'Honey Mustard'] },
                { name: '20 Wings', desc: 'Choose your sauce', quantity: '20 pieces', sauces: ['Hot', 'Medium', 'Mild', 'BBQ', 'Honey Mustard'] },
                { name: '50 Wings', desc: 'Choose your sauce', quantity: '50 pieces', sauces: ['Hot', 'Medium', 'Mild', 'BBQ', 'Honey Mustard'] }
            ],
            hoagies: [
                { name: 'Italian Hoagie', desc: 'On Mancini\'s premium bread' },
                { name: 'Meatball Hoagie', desc: 'On Mancini\'s premium bread' },
                { name: 'Chicken Hoagie', desc: 'On Mancini\'s premium bread' },
                { name: 'Sausage Hoagie', desc: 'On Mancini\'s premium bread' }
            ],
            salads: [
                { name: 'Gyro Salad', desc: 'Fresh greens with gyro meat' },
                { name: 'Chicken Salad', desc: 'Fresh greens with grilled chicken' },
                { name: 'Garden Salad', desc: 'Mixed fresh vegetables' }
            ],
            desserts: [
                { name: 'Cheesecake', desc: 'Rich and creamy' },
                { name: 'Cinnamon Rolls', desc: 'Warm and delicious' },
                { name: 'Brownies', desc: 'Fudgy and fresh' },
                { name: 'Cookies', desc: 'Assorted varieties' }
            ]
        };

        let cart = [];
        let currentCategory = 'pizza';

        function switchCategory(category, btn) {
            currentCategory = category;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu();
        }

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            const items = menuData[currentCategory] || [];
            
            grid.innerHTML = items.map((item, idx) => {
                const isPizza = currentCategory === 'pizza';
                const isWings = currentCategory === 'wings';
                
                return `
                    <div class="menu-item" id="item-${currentCategory}-${idx}">
                        <div class="item-header">
                            <div class="item-name">${item.name}</div>
                            <div class="item-desc">${item.desc}</div>
                        </div>
                        <div class="item-body">
                            ${isPizza ? `
                                <div class="size-selector">
                                    <label class="size-label">Select Size</label>
                                    <div class="size-options">
                                        ${item.sizes.map(size => `
                                            <button class="size-btn" onclick="selectSize(this, '${size}')">${size}</button>
                                        `).join('')}
                                    </div>
                                </div>
                                <div class="toppings-section">
                                    <label class="size-label">Add Toppings (Optional)</label>
                                    <div class="toppings-grid">
                                        ${item.toppings.map(topping => `
                                            <div class="topping-item">
                                                <input type="checkbox" id="topping-${topping}" value="${topping}">
                                                <label for="topping-${topping}">${topping}</label>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : isWings ? `
                                <div class="sauce-selector">
                                    <label class="size-label">Select Sauce</label>
                                    <div class="sauce-options">
                                        ${item.sauces.map(sauce => `
                                            <button class="sauce-btn" onclick="selectSauce(this, '${sauce}')">${sauce}</button>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                            
                            <div class="item-footer">
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="updateQty(this, -1)">−</button>
                                    <div class="qty-display" data-qty="1">1</div>
                                    <button class="qty-btn" onclick="updateQty(this, 1)">+</button>
                                </div>
                                <button class="add-btn" onclick="addToCart('${currentCategory}', ${idx}, '${item.name}')">Add</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Add click handlers to expand items
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    if (!e.target.closest('.item-footer') && !e.target.closest('.size-btn') && !e.target.closest('.sauce-btn') && !e.target.closest('.topping-item')) {
                        this.classList.toggle('expanded');
                    }
                });
            });
        }

        function selectSize(btn, size) {
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function selectSauce(btn, sauce) {
            btn.parentElement.querySelectorAll('.sauce-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function updateQty(btn, delta) {
            const display = btn.parentElement.querySelector('.qty-display');
            let qty = parseInt(display.dataset.qty) + delta;
            qty = Math.max(1, qty);
            display.dataset.qty = qty;
            display.textContent = qty;
        }

        function addToCart(category, itemIdx, itemName) {
            const item = menuData[category][itemIdx];
            const itemEl = document.getElementById(`item-${category}-${itemIdx}`);
            const qtyDisplay = itemEl.querySelector('.qty-display');
            const qty = parseInt(qtyDisplay.dataset.qty);

            let cartItem = {
                id: `${category}-${itemIdx}-${Date.now()}`,
                name: itemName,
                category: category,
                qty: qty,
                options: []
            };

            if (category === 'pizza') {
                const selectedSize = itemEl.querySelector('.size-btn.selected');
                const selectedToppings = Array.from(itemEl.querySelectorAll('.topping-item input:checked')).map(el => el.value);
                if (selectedSize) cartItem.options.push(`Size: ${selectedSize.textContent}`);
                if (selectedToppings.length > 0) cartItem.options.push(`Toppings: ${selectedToppings.join(', ')}`);
            } else if (category === 'wings') {
                const selectedSauce = itemEl.querySelector('.sauce-btn.selected');
                if (selectedSauce) cartItem.options.push(`Sauce: ${selectedSauce.textContent}`);
            }

            cart.push(cartItem);
            updateCartCount();
            
            // Reset form
            qtyDisplay.dataset.qty = 1;
            qtyDisplay.textContent = 1;
            itemEl.querySelectorAll('input:checked').forEach(el => el.checked = false);
            itemEl.querySelectorAll('.size-btn, .sauce-btn').forEach(b => b.classList.remove('selected'));
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function openCart() {
            document.getElementById('cartModal').classList.add('active');
            renderCart();
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
        }

        function renderCart() {
            const cartBody = document.getElementById('cartBody');
            const cartFooter = document.getElementById('cartFooter');

            if (cart.length === 0) {
                cartBody.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
                cartFooter.style.display = 'none';
            } else {
                cartBody.innerHTML = cart.map((item, idx) => `
                    <div class="cart-item">
                        <div class="cart-item-name">${item.name} × ${item.qty}</div>
                        ${item.options.length > 0 ? `<div class="cart-item-details">${item.options.join('<br>')}</div>` : ''}
                        <div class="cart-item-footer">
                            <span class="cart-item-price">$${(Math.random() * 15 + 5).toFixed(2)}</span>
                            <button class="remove-btn" onclick="removeFromCart(${idx})">Remove</button>
                        </div>
                    </div>
                `).join('');
                cartFooter.style.display = 'block';
            }
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            updateCartCount();
            renderCart();
        }

        // Initialize
        renderMenu();
    </script>

</body>
</html>
